#Nighly beta runs branch
nightly-build-branch:
    triggers:
        - schedule:
              cron: '0 0 * * *' # Runs at midnight every day
              filters:
                  branches:
                      only:
                          - main
    jobs:
        - lint-check
        - le-sculptnation-beta-tests:
              context: LE-SculptNation
              requires:
                  - lint-check

#Nighly beta runs tags
nightly-build-tags:
    triggers:
        - schedule:
              cron: '0 1 * * *' # Runs at 1am every day
              filters:
                  tags:
                      only:
                          - /@beta/
    jobs:
        - lint-check
        - le-sculptnation-beta-tests:
              context: LE-SculptNation
              requires:
                  - lint-check
