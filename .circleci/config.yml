# Use the latest 2.1 version of CircleCI pipeline process engine.
version: 2.1

parameters:
    test_type:
        type: enum
        enum:
            [
                none,
                le-sculptnation-pr-validation-tests-workflow,
                le-sculptnation-beta-tests-workflow,
                le-sculptnation-beta-refund-tests-workflow,
                le-sculptnation-all-tests-workflow,
                le-sculptnation-hotfix-workflow,
                le-core-full-tests-workflow,
                le-vshred-smoke-tests-workflow,
                le-vshred-beta-tests-workflow,
                le-vshred-hotfix-tests-workflow,
                le-vshred-all-tests-workflow,
                le-vshred-trainertool-smoke-tests-workflow,
                le-vshred-trainertool-beta-tests-workflow,
                le-vshred-program-purchase-tests-workflow,
                le-vshred-klaviyo-smoke-tests-workflow,
                le-vshred-run-feature-tag-workflow,
                le-vshred-uat-workflow,
                le-marketing-smoke-tests-workflow,
                le-marketing-all-tests-workflow,
                vs-vshred-trainertool-all-tests-workflow,
                vs-marketing-smoke-tests-workflow,
                vs-marketing-all-tests-workflow,
                vs-marketing-blog-tests-workflow,
            ]
        default: none
    trigger_pipeline:
        type: boolean
        default: false
    browser:
        type: enum
        enum: [electron, chrome, firefox, edge]
        default: chrome
    geolocation:
        type: string
        default: ''
    SCRIPT_TAG:
        type: string
        default: '@PR'
    url:
        type: string
        default: 'https://test.xyz.com'
    LE_ADMIN_URL:
        type: string
        default: 'https://test.xyz.com'
    VS_ADMIN_URL:
        type: string
        default: 'https://test.vsx.com'
    LE_VSHRED_URL:
        type: string
        default: 'https://test.vsx.com/'
    SSH_USERNAME:
        type: string
        default: ${CYPRESS_SSH_USERNAME}
    SSH_HOST:
        type: string
        default: ${CYPRESS_SSH_HOST}
    SSH_PORT:
        type: string
        default: ${CYPRESS_SSH_PORT}
    DB_HOST:
        type: string
        default: ${CYPRESS_DB_HOST}
    DB_PORT:
        type: string
        default: ${CYPRESS_DB_PORT}
    DB_DB:
        type: string
        default: ${CYPRESS_DB_DB}
    DB_USER:
        type: string
        default: ${CYPRESS_DB_USER}
    DB_PASSWORD:
        type: string
        default: ${CYPRESS_DB_PASSWORD}
    ASSET_ID:
        type: string
        default: ''
    ASSET_TYPE:
        type: string
        default: ''
    ACTION_TYPE:
        type: string
        default: ''

executors:
    with-chrome:
        docker:
            - image: cypress/browsers:node-20.11.0-chrome-121.0.6167.85-1-ff-120.0-edge-121.0.2277.83-1

# Define the jobs to be invoked later in a workflow.
jobs:
    # Define the lint job
    lint-check:
        executor: with-chrome
        steps:
            - checkout
            - add_ssh_keys:
                  fingerprints:
                      - 'xxx'
            - run:
                  name: 'Install test dependencies'
                  command: 'yarn'
            - run:
                  name: 'Run linting'
                  command: 'yarn lint'

    # Define the PR validation test jobs
    le-sculptnation-pr-validation-tests:
        parameters:
            trigger_param:
                type: boolean
                default: true
        circleci_ip_ranges: true
        executor: with-chrome
        parallelism: 4
        steps:
            - checkout
            - add_ssh_keys:
                  fingerprints:
                      - 'xxx'
            - run:
                  name: 'Install test dependencies'
                  command: 'yarn'
            - run:
                  name: 'Fix CI audio error'
                  command: "echo -e 'pcm.!default {\n type plug\n slave.pcm 'null'\n}' > ~/.asoundrc"
            - run:
                  name: 'LE SculptNation PR validation tests'
                  no_output_timeout: 30m
                  command: 'yarn test:le:sn --browser << pipeline.parameters.browser >> --env tags=@PR,filterSpecs=true,GEOLOCATION=<<pipeline.parameters.geolocation>>,SSH_USERNAME=<<pipeline.parameters.SSH_USERNAME>>,SSH_HOST=<<pipeline.parameters.SSH_HOST>>,SSH_PORT=<<pipeline.parameters.SSH_PORT>>,DB_HOST=<<pipeline.parameters.DB_HOST>>,DB_PORT=<<pipeline.parameters.DB_PORT>>,DB_DB=<<pipeline.parameters.DB_DB>>,DB_USER=<<pipeline.parameters.DB_USER>>,DB_PASSWORD=<<pipeline.parameters.DB_PASSWORD>>,LE_ADMIN_URL=<<pipeline.parameters.LE_ADMIN_URL>>,VS_ADMIN_URL=<<pipeline.parameters.VS_ADMIN_URL>>,LE_VSHRED_URL=<<pipeline.parameters.LE_VSHRED_URL>> --config baseUrl=<<pipeline.parameters.url>>'
            - run:
                  name: 'Install JUnit coverage reporter'
                  command: 'yarn add --dev jest-junit'
            - run:
                  name: 'Install JUnit coverage reporter'
                  command: 'npm install -g jest'
            - run:
                  name: 'Run tests with JUnit as reporter'
                  command: 'jest --ci --runInBand --reporters=default --reporters=jest-junit --passWithNoTests'
                  environment:
                      JEST_JUNIT_OUTPUT_DIR: ./reports/
                      JEST_JUNIT_ADD_FILE_ATTRIBUTE: 'true'
            - store_test_results:
                  path: ./reports/
            - run:
                  name: 'Creating Artifacts'
                  command: 'echo "my artifact file" > /tmp/art-1; mkdir /tmp/artifacts; echo "my artifact files in a dir" > /tmp/artifacts/art-2;'
            - store_artifacts:
                  path: /tmp/art-1
                  destination: artifact-file
            - store_artifacts:
                  path: /tmp/artifacts
    le-vshred-smoke-tests:
        parameters:
            trigger_param:
                type: boolean
                default: true
        circleci_ip_ranges: true
        executor: with-chrome
